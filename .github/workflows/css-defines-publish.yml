name: css_defines_publish

on: workflow_dispatch

jobs:
  css-defines-publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Download Source
        uses: actions/checkout@v6
        with:
          path: lynx
      - name: Python Setup
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install SSH Key
        uses: kielabokkie/ssh-key-and-known-hosts-action@v1.4.1
        with:
          ssh-private-key: ${{ secrets.PRIVATE_SSH_KEY }}
          ssh-host: github.com
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Build
        run: |-
          cd $GITHUB_WORKSPACE/lynx
          source tools/envsetup.sh
      - name: Get Published Version
        id: get-version
        run: |
          VERSION=$(node -p "require('$GITHUB_WORKSPACE/lynx/tools/css_generator/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if version already published
        id: check-published
        env:
          VERSION: ${{ steps.get-version.outputs.version }}
        run: |
          if npm view @lynx-js/css-defines@"$VERSION" version &>/dev/null; then
            echo "Version $VERSION already published on npm registry. Skipping publish."
            echo "already-published=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not found on npm registry. Proceeding to publish."
            echo "already-published=false" >> $GITHUB_OUTPUT
          fi
      - name: Publish
        if: steps.check-published.outputs.already-published != 'true'
        run: |-
          cd $GITHUB_WORKSPACE/lynx/tools/css_generator
          npm publish --access public --provenance

  notify-website:
    needs: css-defines-publish
    if: needs.css-defines-publish.outputs.version
    runs-on: ubuntu-latest
    steps:
      - name: Trigger lynx-website sync
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: lynx-family/lynx-website
          event-type: bump-css-defines
          client-payload: '{"version": "${{ needs.css-defines-publish.outputs.version }}"}'
